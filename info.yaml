yaml_version: 6

project:
  title: "I2C Master Controller"
  author: "Nandhakishoore K"
  description: "Single-byte I2C Master Controller"
  language: "Verilog"
  clock_hz: 10000000

  tiles: "1x1"

  top_module: "tt_um_example"

  source_files:
    - "tt_um_example.v"

pinout:
  ui[0]: "addr0"
  ui[1]: "addr1"
  ui[2]: "addr2"
  ui[3]: "addr3"
  ui[4]: "addr4"
  ui[5]: "addr5"
  ui[6]: "rw"
  ui[7]: "start"

  uo[0]: "busy"
  uo[1]: "done"
  uo[2]: "ack"
  uo[3]: "reserved"
  uo[4]: "reserved"
  uo[5]: "reserved"
  uo[6]: "reserved"
  uo[7]: "reserved"

  uio[0]: "sda"
  uio[1]: "scl"
  uio[2]: "unused"
  uio[3]: "unused"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"
